name: Terraform CI

on:
  push:
    paths:
      - "terraform/**"
    branches: ["main"]
  pull_request:
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        id: fmt

      - name: Terraform Init
        run: terraform init -backend=false
        id: init

      - name: Terraform Validate
        run: terraform validate
        id: validate

      - name: Terraform Plan (dry-run, no AWS credentials)
        id: plan
        # Without AWS credentials the provider hangs on auth; 2 min timeout
        # keeps the job fast. continue-on-error lets the PR comment still post.
        # To enable a real plan, add OIDC AWS credentials before this step.
        timeout-minutes: 2
        continue-on-error: true
        run: |
          terraform plan \
            -var="rds_username=placeholder" \
            -var="rds_password=placeholder" \
            -out=tfplan.binary \
            -no-color 2>&1 | head -200

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Format: \`${{ steps.fmt.outcome }}\`
            #### Terraform Init: \`${{ steps.init.outcome }}\`
            #### Terraform Validate: \`${{ steps.validate.outcome }}\`
            #### Terraform Plan: \`${{ steps.plan.outcome }}\`

            > **No automatic apply.** Apply must be triggered manually after review.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
