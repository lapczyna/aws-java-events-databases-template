name: Build & Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compile and run unit tests
        run: mvn test -B --no-transfer-progress

      - name: Publish Unit Test Results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Unit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

  integration-and-bdd-tests:
    name: Integration & Cucumber BDD Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # failsafe picks up **/*IntegrationTest.java, **/*IT.java, and **/CucumberRunner.java
      # as configured in pom.xml. CucumberRunner emits its own JUnit XML via the
      # junit:target/cucumber-reports/junit.xml plugin (see CucumberRunner.java).
      - name: Run integration tests and Cucumber BDD tests
        run: mvn failsafe:integration-test failsafe:verify -B --no-transfer-progress

      # Integration test XML from failsafe (excludes CucumberRunner — its XML is separate)
      - name: Publish Integration Test Results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Integration Test Results
          path: target/failsafe-reports/*.xml
          reporter: java-junit

      # Cucumber emits proper JUnit XML via its junit plugin — use that for reporting
      - name: Publish Cucumber BDD Test Results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Cucumber BDD Test Results
          path: target/cucumber-reports/junit.xml
          reporter: java-junit

      - name: Upload Cucumber HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: target/cucumber-reports/
