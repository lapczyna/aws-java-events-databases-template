name: Container Build & Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (for Maven build inside Docker)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # On PRs: load into local daemon for Trivy scan (image is not pushed to registry).
          # On push/tag: push to GHCR (load: false avoids buildx push+load conflict).
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        id: trivy
        # Run Trivy directly as a Docker container to avoid action version chain issues.
        # On PRs the image is in the local daemon (load: true above); on push it was
        # pushed to GHCR. Trivy checks the local daemon first, then pulls from remote.
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        # Skip on PRs: GITHUB_TOKEN has restricted scope on pull_request events,
        # causing "Resource not accessible by integration". SARIF results are only
        # meaningful on the default branch anyway.
        if: >
          always() &&
          github.event_name != 'pull_request' &&
          steps.trivy.outcome != 'skipped' &&
          hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
