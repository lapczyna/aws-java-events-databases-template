# Ingress placeholder — requires AWS Load Balancer Controller on EKS.
# Install: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ad-platform-ingress
  namespace: ad-platform
  labels:
    app.kubernetes.io/name: ad-platform
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
spec:
  rules:
    - host: api.adplatform.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ad-platform-svc
                port:
                  number: 80
