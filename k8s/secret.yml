  DB_USERNAME: "REPLACE_WITH_SECRET"
  DB_PASSWORD: "REPLACE_WITH_SECRET"
  KAFKA_BOOTSTRAP_SERVERS: "REPLACE_WITH_MSK_OR_KAFKA_ENDPOINT:9092"
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/ad-events-queue"
