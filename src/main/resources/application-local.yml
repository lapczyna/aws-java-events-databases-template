spring:
  datasource:
    url: jdbc:mysql://localhost:3306/adplatform
    username: adplatform
    password: adplatform

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

aws:
  region: us-east-1
  localstack:
    enabled: true
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test
  sqs:
    queue-url: http://localhost:4566/000000000000/ad-events-queue
  dynamodb:
    table-name: ad-impression-events

logging:
  level:
    com.enterprise.adplatform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
